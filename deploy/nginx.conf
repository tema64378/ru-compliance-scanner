# nginx: лендинг (статика) + проксирование API на том же домене.
# Замени ВАШ_ДОМЕН на свой (напр. 152check.ru). HTTPS добавит certbot.
server {
    listen 80;
    server_name ВАШ_ДОМЕН;

    root /var/www/152check/landing;
    index index.html;

    # лендинг
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API на том же домене → лендингу не нужен CORS, API_BASE можно оставить пустым
    location ~ ^/(scan|order|robokassa|download|health) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
